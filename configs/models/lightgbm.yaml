# LightGBM baseline

model_type: "lightgbm"
version: "1.0"

params:
  objective: "binary"
  metric: "auc"
  n_estimators: 500
  learning_rate: 0.05
  num_leaves: 31
  max_depth: -1
  min_child_samples: 20
  subsample: 0.8
  colsample_bytree: 0.8
  is_unbalance: true
  verbose: -1

feature_set: "structured_v1"
