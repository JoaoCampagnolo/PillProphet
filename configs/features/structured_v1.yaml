# Structured feature configuration: v1
# Source columns must match parse.py output exactly.

version: "1.0"

# Categorical features — one-hot encoded, unknown/missing -> "MISSING" category.
categorical:
  - name: "phases"
    source_column: "phases"
    time_availability: "T0"
  - name: "allocation"
    source_column: "allocation"
    time_availability: "T0"
  - name: "intervention_model"
    source_column: "intervention_model"
    time_availability: "T0"
  - name: "masking"
    source_column: "masking"
    time_availability: "T0"
  - name: "primary_purpose"
    source_column: "primary_purpose"
    time_availability: "T0"
  - name: "enrollment_type"
    source_column: "enrollment_type"
    time_availability: "T0"
  - name: "sex"
    source_column: "sex"
    time_availability: "T0"
  - name: "lead_sponsor_class"
    source_column: "lead_sponsor_class"
    time_availability: "T0"
  - name: "healthy_volunteers"
    source_column: "healthy_volunteers"
    time_availability: "T0"
  - name: "has_dmc"
    source_column: "has_dmc"
    time_availability: "T0"

# Numeric features — used as-is after imputation.
numeric:
  - name: "enrollment"
    source_column: "enrollment"
    time_availability: "T2"
    impute: "median"
    log_transform: true
  - name: "n_arms"
    source_column: "n_arms"
    time_availability: "T0"
    impute: "median"
  - name: "n_interventions"
    source_column: "n_interventions"
    time_availability: "T0"
    impute: 0
  - name: "n_primary_outcomes"
    source_column: "n_primary_outcomes"
    time_availability: "T0"
    impute: 0
  - name: "n_secondary_outcomes"
    source_column: "n_secondary_outcomes"
    time_availability: "T0"
    impute: 0
  - name: "n_locations"
    source_column: "n_locations"
    time_availability: "T0"
    impute: 0
    log_transform: true
  - name: "n_collaborators"
    source_column: "n_collaborators"
    time_availability: "T0"
    impute: 0
  - name: "minimum_age_years"
    source_column: "minimum_age"
    time_availability: "T0"
    impute: "median"
    parse_age: true
  - name: "maximum_age_years"
    source_column: "maximum_age"
    time_availability: "T0"
    impute: "median"
    parse_age: true

# Derived features — computed from one or more source columns.
derived:
  - name: "n_countries"
    derivation: "count_delimited"
    source_column: "countries"
    delimiter: "; "
    time_availability: "T0"
  - name: "n_conditions"
    derivation: "count_delimited"
    source_column: "conditions"
    delimiter: "; "
    time_availability: "T0"
  - name: "n_keywords"
    derivation: "count_delimited"
    source_column: "keywords"
    delimiter: "; "
    time_availability: "T0"
  - name: "eligibility_length"
    derivation: "text_length"
    source_column: "eligibility_criteria"
    time_availability: "T0"
  - name: "brief_summary_length"
    derivation: "text_length"
    source_column: "brief_summary"
    time_availability: "T0"
  - name: "has_collaborators"
    derivation: "boolean_flag"
    source_column: "n_collaborators"
    time_availability: "T0"
