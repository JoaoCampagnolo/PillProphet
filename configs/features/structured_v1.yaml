# Structured feature configuration: v1

version: "1.0"

features:
  protocol:
    - name: "phase"
      source: "phase"
      type: "categorical"
      time_availability: "T0"
    - name: "study_design"
      source: "study_design_info.intervention_model"
      type: "categorical"
      time_availability: "T0"
    - name: "allocation"
      source: "study_design_info.allocation"
      type: "categorical"
      time_availability: "T0"
    - name: "masking"
      source: "study_design_info.masking"
      type: "categorical"
      time_availability: "T0"
    - name: "enrollment"
      source: "enrollment_info.count"
      type: "numeric"
      time_availability: "T0"
    - name: "number_of_arms"
      source: "number_of_arms"
      type: "numeric"
      time_availability: "T0"
    - name: "number_of_groups"
      source: "number_of_groups"
      type: "numeric"
      time_availability: "T0"

  demographics:
    - name: "has_age_restriction"
      source: "eligibility"
      type: "binary"
      time_availability: "T0"
    - name: "sex_restriction"
      source: "eligibility.sex"
      type: "categorical"
      time_availability: "T0"
    - name: "min_age"
      source: "eligibility.minimum_age"
      type: "numeric"
      time_availability: "T0"
    - name: "max_age"
      source: "eligibility.maximum_age"
      type: "numeric"
      time_availability: "T0"

  sponsor:
    - name: "sponsor_class"
      source: "lead_sponsor.agency_class"
      type: "categorical"
      time_availability: "T0"

  geography:
    - name: "num_locations"
      source: "locations"
      type: "numeric"
      time_availability: "T0"
    - name: "num_countries"
      source: "locations"
      type: "numeric"
      time_availability: "T0"

  endpoints:
    - name: "num_primary_outcomes"
      source: "primary_outcomes"
      type: "numeric"
      time_availability: "T0"
    - name: "num_secondary_outcomes"
      source: "secondary_outcomes"
      type: "numeric"
      time_availability: "T0"

  timing:
    - name: "estimated_duration_days"
      source: "dates"
      type: "numeric"
      time_availability: "T0"
