# Text feature configuration: v1
# Source columns must match parse.py output exactly.

version: "1.0"

# Text fields to concatenate into a single document per trial.
text_fields:
  - name: "brief_title"
    source_column: "brief_title"
    time_availability: "T0"
  - name: "official_title"
    source_column: "official_title"
    time_availability: "T0"
  - name: "brief_summary"
    source_column: "brief_summary"
    time_availability: "T0"
  - name: "detailed_description"
    source_column: "detailed_description"
    time_availability: "T0"
  - name: "eligibility_criteria"
    source_column: "eligibility_criteria"
    time_availability: "T0"
  - name: "conditions"
    source_column: "conditions"
    time_availability: "T0"
  - name: "intervention_names"
    source_column: "intervention_names"
    time_availability: "T0"
  - name: "primary_outcome_measures"
    source_column: "primary_outcome_measures"
    time_availability: "T0"

preprocessing:
  lowercase: true
  remove_html: true
  min_token_length: 2

tfidf:
  max_features: 5000
  ngram_range: [1, 2]
  min_df: 5
  max_df: 0.95
  sublinear_tf: true
