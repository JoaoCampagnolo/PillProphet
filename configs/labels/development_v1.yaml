# Development label configuration: v3 (revised after second audit)

version: "3.0"

primary_target: "phase_advancement"

# Time window (months) after primary completion to check for advancement.
advancement_window_months: 36

# Phase advancement definitions.
advancement_rules:
  phase_2:
    target_phases: ["Phase 3", "Phase 2/Phase 3"]

# Matching strategy for linking trials across phases.
trial_linking:
  match_fields:
    - "intervention_name"
    - "lead_sponsor"
    - "condition"
  fuzzy_threshold: 0.85
  # v2+: require temporal ordering (successor first_post_date > anchor first_post_date).
  require_temporal_ordering: true

# Censoring policy.
censoring:
  min_followup_months: 36
  # v3 censoring splits:
  #   soft_negative with < min_followup → censored_recent
  #   ambiguous_negative with < min_followup → censored_recent
  #   hard_negative with < min_followup → censored_early_negative
  #   in_progress status → censored_in_progress

# Label values (v3 — expanded from v2).
labels:
  positive: "advanced"
  excluded_positive_terminal: "excluded_positive_terminal"
  hard_negative: "hard_negative"
  ambiguous_negative: "ambiguous_negative"
  soft_negative: "soft_negative"
  censored_recent: "censored_recent"
  censored_in_progress: "censored_in_progress"
  censored_early_negative: "censored_early_negative"

# Nested modeling benchmarks (v3).
modeling_benchmarks:
  strict:
    positives: ["advanced"]
    negatives: ["hard_negative"]
  intermediate:
    positives: ["advanced"]
    negatives: ["hard_negative", "ambiguous_negative"]
  broad:
    positives: ["advanced"]
    negatives: ["hard_negative", "ambiguous_negative", "soft_negative"]

# Eligibility (documented here, enforced in dev_eligibility.py).
eligibility:
  phase: "PHASE2"           # exact match, no mixed phases
  primary_purpose: "TREATMENT"
  excluded_designs:
    - "PK/PD"
    - "bioavailability"
    - "formulation"
    - "open-label extension"
    - "long-term safety"
    - "rollover"
    - "mechanistic probe"

# Soft-negative diagnostic flags (v3 — metadata, not exclusions).
# These flags enable sensitivity analysis during modeling.
soft_negative_flags:
  lifecycle_flag:
    description: "Title suggests lifecycle / expansion / dose optimization"
    action: "flag_only"
  broad_basket_flag:
    description: "Broad basket / platform / multi-tumor-type study"
    action: "flag_only"
  supportive_flag:
    description: "Supportive / procedural / adjunctive study"
    action: "flag_only"
  common_asset_flag:
    description: "Intervention appears in 10+ trials in cohort"
    threshold: 10
    action: "flag_only"
